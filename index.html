<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="MapMapMaps — free GeoGuessr-style game on Mapillary 360° panoramas. No paid APIs."
    />
    <meta property="og:title" content="MapMapMaps" />
    <meta
      property="og:description"
      content="Guess the place from a random Mapillary street panorama."
    />
    <meta property="og:url" content="https://mapmapmaps.com/" />
    <link rel="canonical" href="https://mapmapmaps.com/" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#00c896" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>MapMapMaps — Guess the location</title>
    <link rel="icon" href="/image/mascot-pin.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/mapillary-js@4.1.2/dist/mapillary.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/mapillary-js@4.1.2/dist/mapillary.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  </head>
  <body>
    <div id="panorama" aria-hidden="true"></div>

    <video
      class="preloader"
      src="./image/loader.mp4"
      loop
      muted
      autoplay
      playsinline
      preload="auto"
      aria-label="Loading"
    ></video>

    <main class="app" id="app">
      <header class="hud">
        <div class="hud__mascot" id="hud-mascot" aria-label="MapMapMaps">
          <svg class="hud__mascot-svg" viewBox="0 0 36 44" width="34" height="42" aria-hidden="true">
            <path
              d="M18 0C10.82 0 5 5.58 5 12.45c0 9.2 12.2 24.8 12.75 25.55.55.75 1.45.75 2 0 .55-.75 12.75-16.35 12.75-25.55C32.5 5.58 26.68 0 18 0Z"
              fill="#00C896"
            />
            <g id="mascot-eyes">
              <rect x="10.5" y="10.5" width="5.5" height="5.5" rx="1.6" fill="#F8FAFC"/>
              <rect x="20" y="10.5" width="5.5" height="5.5" rx="1.6" fill="#F8FAFC"/>
            </g>
          </svg>
        </div>

        <div class="hud__score-chip" aria-live="polite">
          <span class="hud__score-label" data-i18n="runLabel">Run</span>
          <span class="hud__score-value" id="score-pill">0</span>
        </div>

        <div class="run-track" id="progress" data-i18n="progressAria" data-i18n-attr="aria-label">
          <div class="run-track__meta">
            <span class="run-track__label" id="round-pill">View 1 of 5</span>
            <span class="run-track__pct" id="run-pct">0%</span>
          </div>
          <div class="run-track__path">
            <div class="run-track__bar" aria-hidden="true">
              <div class="run-track__fill" id="run-track-fill"></div>
            </div>
            <ol class="run-track__steps">
            <li class="run-step is-current" data-step="1"><span class="run-step__icon"></span></li>
            <li class="run-step" data-step="2"><span class="run-step__icon"></span></li>
            <li class="run-step" data-step="3"><span class="run-step__icon"></span></li>
            <li class="run-step" data-step="4"><span class="run-step__icon"></span></li>
            <li class="run-step" data-step="5"><span class="run-step__icon"></span></li>
            </ol>
          </div>
        </div>
      </header>

      <section class="dock" id="dock">
        <form class="dock__row" id="guess-form" autocomplete="off">
          <label class="dock__field">
            <span class="dock__icon" aria-hidden="true">⌕</span>
            <input
              id="guess-input"
              class="dock__input"
              type="text"
              data-i18n-placeholder="placeholderGuess"
              placeholder="City or country…"
              autocomplete="off"
              enterkeyhint="search"
            />
            <ul id="autocomplete" class="dock__autocomplete" hidden></ul>
          </label>
          <button class="btn btn--primary" id="guess-btn" type="submit" data-i18n="guess">Guess</button>
        </form>
        <div class="dock__links">
          <button class="link-btn" id="replace-btn" type="button" data-i18n="newSpot">New spot</button>
          <button class="link-btn" id="map-toggle" type="button" aria-expanded="false" data-i18n="pickOnMap">
            Pick on map
          </button>
        </div>
      </section>

      <section class="map-sheet" id="map-panel" hidden>
        <header class="map-sheet__bar">
          <button class="btn btn--soft" id="map-back" type="button" data-i18n="streetView">← Street view</button>
          <button
            class="map-sheet__hint"
            id="map-pin-hint"
            type="button"
            disabled
            aria-live="polite"
          >
            <span class="map-sheet__hint-text" id="map-pin-hint-text"></span>
            <span class="map-sheet__hint-x" id="map-pin-hint-x" hidden aria-hidden="true">×</span>
          </button>
          <button class="btn btn--primary btn--sm" id="map-guess-btn" type="button" disabled data-i18n="guess">
            Guess
          </button>
        </header>
        <div id="guess-map" class="map-sheet__map" role="application" aria-label="Guess map"></div>
      </section>

      <div class="game-complete" id="game-complete" hidden>
        <canvas class="confetti-canvas" id="confetti-canvas" aria-hidden="true"></canvas>
        <div class="game-complete__card" role="dialog" aria-labelledby="game-complete-title">
          <p class="game-complete__badge" id="game-complete-badge" hidden>New record!</p>
          <h2 class="game-complete__title" id="game-complete-title" data-i18n="gameComplete">Game complete!</h2>
          <p class="game-complete__label" data-i18n="thisGame">This game</p>
          <p class="game-complete__total" id="game-complete-total">0 pts</p>
          <p class="game-complete__label" data-i18n="personalBest">Personal best</p>
          <p class="game-complete__best" id="game-complete-best">0 pts</p>
          <p class="game-complete__sub" id="game-complete-sub"></p>
          <button class="btn btn--primary game-complete__play" id="game-complete-play" type="button" data-i18n="playAgain">
            Play again
          </button>
        </div>
      </div>

      <div class="result" id="result" hidden>
        <div class="result__card">
          <div class="result__summary">
            <p class="result__cheer" id="result-cheer">Nice!</p>
            <div class="result__stars" id="result-stars" aria-label="Round rating">
              <span class="result__star" data-i="1"></span>
              <span class="result__star" data-i="2"></span>
              <span class="result__star" data-i="3"></span>
            </div>
            <p class="result__round" id="result-round">Stop 1 complete</p>
            <p class="result__gain" id="result-gain">+0</p>
            <h2 class="result__score" id="result-score">0 pts</h2>
            <p class="result__distance" id="result-distance">0 km away</p>
          </div>
          <div class="result__places">
            <div class="result__place">
              <span class="result__dot result__dot--guess"></span>
              <div>
                <span class="result__label" data-i18n="yourGuess">Your guess</span>
                <strong id="result-guess-label">—</strong>
              </div>
            </div>
            <div class="result__place">
              <span class="result__dot result__dot--actual"></span>
              <div>
                <span class="result__label" data-i18n="actual">Actual</span>
                <strong id="result-actual-label">—</strong>
              </div>
            </div>
          </div>
          <div id="result-map" class="result__map"></div>
          <button class="btn btn--primary result__next" id="next-btn" type="button" data-i18n="continue">
            Continue
          </button>
        </div>
      </div>

      <p class="toast" id="toast" role="status" aria-live="polite" hidden></p>

      <a
        class="donate-float"
        id="donate-btn"
        href="https://ko-fi.com/mircfun"
        target="_blank"
        rel="noopener noreferrer"
        data-i18n="donateTitle"
        data-i18n-attr="title"
        title="Support MapMapMaps"
        aria-label="Donate — support MapMapMaps"
      >
        <img src="./image/donate_icon.svg" alt="" width="18" height="18" />
        <span data-i18n="donate">Donate</span>
      </a>

      <button
        class="sfx-float"
        id="sfx-toggle"
        type="button"
        aria-pressed="false"
        title="Mute sounds"
      >
        <span class="sfx-float__on" aria-hidden="true">🔊</span>
        <span class="sfx-float__off" aria-hidden="true">🔇</span>
      </button>
    </main>

    <script src="/js/i18n.js"></script>
    <script src="/js/sfx.js"></script>
    <script src="/script.js?v=580d436"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js?v=580d436").catch(() => {});
        });
      }
    </script>
  </body>
</html>
