name: Deploy VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skip until VPS_* secrets are set (see DEPLOY_SIMPLE.md — or use server autopull)
    if: ${{ secrets.VPS_HOST != '' && secrets.VPS_USER != '' && secrets.VPS_SSH_KEY != '' }}
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          MAPILLARY_ACCESS_TOKEN: ${{ secrets.MAPILLARY_ACCESS_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: MAPILLARY_ACCESS_TOKEN
          script: |
            set -e
            export APP_DIR=/var/www/mapmapmaps
            export REPO_URL=https://github.com/baver001/mapmapmaps.git
            if [ ! -d "$APP_DIR/.git" ]; then
              sudo mkdir -p "$APP_DIR"
              sudo git clone "$REPO_URL" "$APP_DIR"
              sudo chown -R "$USER:$USER" "$APP_DIR"
            fi
            bash "$APP_DIR/deploy/vps/remote-deploy.sh"

  deploy-skipped:
    runs-on: ubuntu-latest
    if: ${{ secrets.VPS_HOST == '' || secrets.VPS_USER == '' || secrets.VPS_SSH_KEY == '' }}
    steps:
      - name: Note
        run: |
          echo "GitHub→VPS SSH deploy skipped (VPS_HOST / VPS_USER / VPS_SSH_KEY not set)."
          echo "Use server autopull: deploy/vps/install-autopull.sh — see DEPLOY_SIMPLE.md"
