name: Deploy VPS

# Автодеплой по push — через autopull на сервере (см. DEPLOY_SIMPLE.md).
# Этот workflow — ручной SSH-деплой, когда заданы VPS_* secrets в GitHub.

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          MAPILLARY_ACCESS_TOKEN: ${{ secrets.MAPILLARY_ACCESS_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: MAPILLARY_ACCESS_TOKEN
          script: |
            set -e
            export APP_DIR=/var/www/mapmapmaps
            export REPO_URL=https://github.com/baver001/mapmapmaps.git
            if [ ! -d "$APP_DIR/.git" ]; then
              sudo mkdir -p "$APP_DIR"
              sudo git clone "$REPO_URL" "$APP_DIR"
              sudo chown -R "$USER:$USER" "$APP_DIR"
            fi
            bash "$APP_DIR/deploy/vps/remote-deploy.sh"
